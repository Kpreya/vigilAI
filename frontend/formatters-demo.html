<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatters Demo - VigilAI</title>
    
    <style>
        body {
            font-family: 'Courier New', monospace;
        }
    </style>
<link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 border-b-4 border-black pb-4">Formatters Demo</h1>
        
        <!-- Date/Time Formatting -->
        <div class="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Date/Time Formatting</h2>
            <div class="space-y-2 text-sm">
                <div><strong>Just now:</strong> <span id="demo-just-now"></span></div>
                <div><strong>5 mins ago:</strong> <span id="demo-5-mins"></span></div>
                <div><strong>3 hours ago:</strong> <span id="demo-3-hours"></span></div>
                <div><strong>5 days ago:</strong> <span id="demo-5-days"></span></div>
                <div><strong>Absolute date:</strong> <span id="demo-absolute"></span></div>
                <div><strong>Absolute date/time:</strong> <span id="demo-absolute-time"></span></div>
            </div>
        </div>

        <!-- Number Formatting -->
        <div class="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Number Formatting</h2>
            <div class="space-y-2 text-sm">
                <div><strong>1234:</strong> <span id="demo-num-1"></span></div>
                <div><strong>1234567:</strong> <span id="demo-num-2"></span></div>
                <div><strong>85% (decimal):</strong> <span id="demo-pct-1"></span></div>
                <div><strong>85% (percentage):</strong> <span id="demo-pct-2"></span></div>
            </div>
        </div>

        <!-- Severity Badges -->
        <div class="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Severity Badges</h2>
            <div class="space-y-3">
                <div class="flex items-center gap-4">
                    <span class="w-24 text-sm font-bold">CRITICAL:</span>
                    <span id="demo-severity-critical"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-24 text-sm font-bold">HIGH:</span>
                    <span id="demo-severity-high"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-24 text-sm font-bold">MEDIUM:</span>
                    <span id="demo-severity-medium"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-24 text-sm font-bold">LOW:</span>
                    <span id="demo-severity-low"></span>
                </div>
            </div>
        </div>

        <!-- Status Badges -->
        <div class="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Status Badges</h2>
            <div class="space-y-3">
                <div class="flex items-center gap-4">
                    <span class="w-32 text-sm font-bold">OPEN:</span>
                    <span id="demo-status-open"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-32 text-sm font-bold">IN_PROGRESS:</span>
                    <span id="demo-status-progress"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-32 text-sm font-bold">RESOLVED:</span>
                    <span id="demo-status-resolved"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="w-32 text-sm font-bold">IGNORED:</span>
                    <span id="demo-status-ignored"></span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            formatRelativeTime,
            formatAbsoluteDate,
            formatAbsoluteDateTime,
            formatNumber,
            formatPercentage,
            formatSeverityBadge,
            formatStatusBadge
        } from './js/utils/formatters.js';

        // Date/Time demos
        const now = new Date();
        document.getElementById('demo-just-now').textContent = formatRelativeTime(new Date(now.getTime() - 30 * 1000));
        document.getElementById('demo-5-mins').textContent = formatRelativeTime(new Date(now.getTime() - 5 * 60 * 1000));
        document.getElementById('demo-3-hours').textContent = formatRelativeTime(new Date(now.getTime() - 3 * 60 * 60 * 1000));
        document.getElementById('demo-5-days').textContent = formatRelativeTime(new Date(now.getTime() - 5 * 24 * 60 * 60 * 1000));
        document.getElementById('demo-absolute').textContent = formatAbsoluteDate('2024-01-15T12:00:00Z');
        document.getElementById('demo-absolute-time').textContent = formatAbsoluteDateTime('2024-01-15T15:45:00Z');

        // Number demos
        document.getElementById('demo-num-1').textContent = formatNumber(1234);
        document.getElementById('demo-num-2').textContent = formatNumber(1234567);
        document.getElementById('demo-pct-1').textContent = formatPercentage(0.85, true);
        document.getElementById('demo-pct-2').textContent = formatPercentage(85, false);

        // Severity badges
        document.getElementById('demo-severity-critical').innerHTML = formatSeverityBadge('CRITICAL');
        document.getElementById('demo-severity-high').innerHTML = formatSeverityBadge('HIGH');
        document.getElementById('demo-severity-medium').innerHTML = formatSeverityBadge('MEDIUM');
        document.getElementById('demo-severity-low').innerHTML = formatSeverityBadge('LOW');

        // Status badges
        document.getElementById('demo-status-open').innerHTML = formatStatusBadge('OPEN');
        document.getElementById('demo-status-progress').innerHTML = formatStatusBadge('IN_PROGRESS');
        document.getElementById('demo-status-resolved').innerHTML = formatStatusBadge('RESOLVED');
        document.getElementById('demo-status-ignored').innerHTML = formatStatusBadge('IGNORED');
    </script>
</body>
</html>
