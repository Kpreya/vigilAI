<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign Up - VigilAI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style type="text/tailwindcss">
        .paper-grid {
            background-size: 20px 20px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .strength-bar { transition: width 0.3s ease, background-color 0.3s ease; }
    </style>
<link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-paper-bg text-black font-sans min-h-screen paper-grid flex items-center justify-center selection:bg-black selection:text-white py-8">

    <!-- Top bar -->
    <div class="fixed top-0 left-0 right-0 bg-white border-b border-black z-10 px-8 py-4 flex items-center justify-between">
        <a href="/index.html" class="flex items-center space-x-3 hover:opacity-70 transition-opacity">
            <div class="w-8 h-8 bg-black flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-lg">visibility</span>
            </div>
            <span class="font-display font-bold text-xl">VigilAI</span>
        </a>
        <a href="/login.html" class="text-sm font-mono text-slate-500 hover:text-black transition-colors">
            Have an account? <span class="font-bold text-black underline">Sign in →</span>
        </a>
    </div>

    <!-- Signup Form -->
    <div class="w-full max-w-md mx-4 mt-16">
        <div class="bg-white border-2 border-black p-8 shadow-brutal">
            <div class="mb-8 text-center">
                <div class="w-16 h-16 bg-black border border-black flex items-center justify-center shadow-brutal-sm mx-auto mb-4">
                    <span class="material-symbols-outlined text-white text-4xl">visibility</span>
                </div>
                <h1 class="text-2xl font-display font-bold text-black mb-2">Get Started Free</h1>
                <p class="text-slate-500 font-mono text-sm">Create your VigilAI account</p>
            </div>

            <form id="signup-form" class="space-y-5">
                <div id="signup-error" class="hidden bg-red-50 border-2 border-red-500 p-3 text-sm font-mono text-red-700"></div>

                <div>
                    <label for="name" class="block text-sm font-mono font-bold text-black mb-2 uppercase tracking-wider">Full Name</label>
                    <input type="text" id="name" name="name" required autocomplete="name"
                        class="w-full px-4 py-3 border-2 border-black font-mono text-sm focus:outline-none shadow-brutal-sm"
                        placeholder="John Doe"/>
                </div>

                <div>
                    <label for="email" class="block text-sm font-mono font-bold text-black mb-2 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 border-2 border-black font-mono text-sm focus:outline-none shadow-brutal-sm"
                        placeholder="you@company.com"/>
                </div>

                <div>
                    <label for="password" class="block text-sm font-mono font-bold text-black mb-2 uppercase tracking-wider">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password"
                        class="w-full px-4 py-3 border-2 border-black font-mono text-sm focus:outline-none shadow-brutal-sm"
                        placeholder="Min. 8 characters"/>
                    <div class="mt-2">
                        <div class="flex justify-between mb-1">
                            <span class="text-xs font-mono text-slate-400 uppercase">Strength</span>
                            <span id="strength-label" class="text-xs font-mono font-bold uppercase text-slate-400">—</span>
                        </div>
                        <div class="w-full h-1 bg-slate-200 border border-black">
                            <div id="strength-bar" class="strength-bar h-full bg-slate-300" style="width:0%"></div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="signup-btn"
                    class="w-full bg-black text-white py-4 font-mono font-bold uppercase tracking-widest text-sm border-2 border-black hover:bg-white hover:text-black transition-all shadow-brutal active:shadow-none active:translate-x-1 active:translate-y-1">
                    Create Account →
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500 font-mono">
                    Already have an account?
                    <a href="/login.html" class="text-black font-bold hover:underline">Sign in</a>
                </p>
            </div>
        </div>

        <div class="mt-4 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-black shadow-brutal-sm">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <span class="text-xs font-mono font-bold uppercase">System: Operational</span>
            </div>
        </div>
    </div>

    <script type="module">
        // Auto-detect environment: use nginx proxy in production, direct connection in dev
        const isProduction = window.location.port === '' || window.location.port === '80' || window.location.port === '443';
        const API_BASE = isProduction ? '/api' : 'http://localhost:3000/api';
        const form = document.getElementById('signup-form');
        const btn = document.getElementById('signup-btn');
        const errBox = document.getElementById('signup-error');

        // If already logged in, go to dashboard
        if (localStorage.getItem('auth_token')) {
            window.location.href = '/dashboard.html';
        }

        // Password strength
        document.getElementById('password').addEventListener('input', e => {
            const p = e.target.value;
            let score = 0;
            if (p.length >= 8) score += 25;
            if (p.length >= 12) score += 15;
            if (/[a-z]/.test(p)) score += 15;
            if (/[A-Z]/.test(p)) score += 15;
            if (/[0-9]/.test(p)) score += 15;
            if (/[^a-zA-Z0-9]/.test(p)) score += 15;
            score = Math.min(score, 100);

            const bar = document.getElementById('strength-bar');
            const label = document.getElementById('strength-label');
            bar.style.width = score + '%';
            if (score >= 70) { bar.style.backgroundColor = '#16a34a'; label.textContent = 'Strong'; label.style.color = '#16a34a'; }
            else if (score >= 40) { bar.style.backgroundColor = '#ca8a04'; label.textContent = 'Medium'; label.style.color = '#ca8a04'; }
            else if (score > 0) { bar.style.backgroundColor = '#dc2626'; label.textContent = 'Weak'; label.style.color = '#dc2626'; }
            else { bar.style.backgroundColor = '#cbd5e1'; label.textContent = '—'; label.style.color = '#94a3b8'; }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.classList.add('hidden');

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) {
                errBox.textContent = 'Please fill in all fields.';
                errBox.classList.remove('hidden');
                return;
            }
            if (password.length < 8) {
                errBox.textContent = 'Password must be at least 8 characters.';
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch(`${API_BASE}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Could not create account');
                }

                localStorage.setItem('auth_token', data.data.token);
                localStorage.setItem('auth_user', JSON.stringify(data.data.user));
                window.location.href = '/dashboard.html';
            } catch (err) {
                errBox.textContent = err.message || 'Signup failed. Please try again.';
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        });
    </script>
</body>
</html>
