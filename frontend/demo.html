<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Demo App - VigilAI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style type="text/tailwindcss">
        .paper-grid {
            background-size: 20px 20px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<link rel="stylesheet" href="/css/tailwind.css">
<!-- Include Vigil SDK -->
<script src="/js/vigil-sdk.js"></script>
</head>
<body class="bg-paper-bg text-black font-sans min-h-screen paper-grid flex items-center justify-center selection:bg-black selection:text-white">

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Top bar -->
    <div class="fixed top-0 left-0 right-0 bg-white border-b border-black z-10 px-8 py-4 flex items-center justify-between">
        <a href="/index.html" class="flex items-center space-x-3 hover:opacity-70 transition-opacity">
            <div class="w-8 h-8 bg-black flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-lg">science</span>
            </div>
            <span class="font-display font-bold text-xl">VigilAI Demo App</span>
        </a>
        <a href="/dashboard.html" class="text-sm font-mono text-slate-500 hover:text-black transition-colors">
            Back to <span class="font-bold text-black underline">Dashboard →</span>
        </a>
    </div>

    <!-- Demo Form -->
    <div class="w-full max-w-md mx-4 mt-16">
        <div class="bg-white border-2 border-black p-8 shadow-brutal">
            <div class="mb-8 text-center">
                <div class="w-16 h-16 bg-blue-100 border border-black flex items-center justify-center shadow-brutal-sm mx-auto mb-4">
                    <span class="material-symbols-outlined text-blue-600 text-4xl">bug_report</span>
                </div>
                <h1 class="text-2xl font-display font-bold text-black mb-2">Simulate Error</h1>
                <p class="text-slate-500 font-mono text-sm max-w-[250px] mx-auto">Trigger an error to see it caught by the SDK and sent to the VigilAI dashboard.</p>
            </div>

            <form id="demo-form" class="space-y-5">
                <div>
                    <label for="api-key" class="block text-sm font-mono font-bold text-black mb-2 uppercase tracking-wider">
                        Your API Key <span class="text-red-600">*</span>
                    </label>
                    <input
                        type="text"
                        id="api-key"
                        required
                        class="w-full px-4 py-3 border-2 border-black font-mono text-sm focus:outline-none focus:ring-0 focus:border-black shadow-brutal-sm"
                        placeholder="vgl_..."
                    />
                    <p class="text-xs text-slate-500 font-mono mt-2">Find this in your VigilAI Configuration > API Keys.</p>
                </div>

                <div class="pt-4 border-t border-dashed border-slate-300">
                    <button
                        type="button"
                        id="trigger-error-btn"
                        class="w-full bg-red-600 text-white py-4 font-mono font-bold uppercase tracking-widest text-sm border-2 border-black hover:bg-white hover:text-red-600 transition-all shadow-brutal active:shadow-none active:translate-x-1 active:translate-y-1 flex items-center justify-center gap-2"
                    >
                        <span class="material-symbols-outlined text-xl">warning</span>
                        Trigger Login Crash
                    </button>
                </div>
            </form>
            <div id="status-message" class="mt-4 hidden p-3 font-mono text-sm text-center border-2 border-black font-bold">
            </div>
        </div>
    </div>

    <script type="module">
        import toast from '/js/toast.js';

        const triggerBtn = document.getElementById('trigger-error-btn');
        const apiKeyInput = document.getElementById('api-key');
        const statusMsg = document.getElementById('status-message');

        triggerBtn.addEventListener('click', () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                toast.error('Please enter your API Key first.');
                return;
            }

            // Initialize SDK just in time for the demo
            window.VigilSDK.init({
                apiKey: apiKey,
                endpoint: 'http://localhost:3000/api/events',
                environment: 'production'
            });

            statusMsg.classList.remove('hidden');
            statusMsg.className = 'mt-4 p-3 font-mono text-sm text-center border-2 border-black font-bold bg-yellow-50 text-yellow-700';
            statusMsg.textContent = 'Simulating crash... Check your dashboard!';

            // Simulate an uncanny login crash
            setTimeout(() => {
                triggerLoginCrash();
            }, 500);
        });

        function triggerLoginCrash() {
            // This is a simulated error that gets caught by the unhandled exceptions listener in vigil-sdk.js
            class AuthTimeoutError extends Error {
                constructor(message) {
                    super(message);
                    this.name = 'AuthTimeoutError';
                }
            }

            // Generate an intentional unhandled promise rejection
            Promise.reject(new AuthTimeoutError("Authentication service connection timed out after 5000ms. Could not reach upstream identity provider."));
        }
    </script>
</body>
</html>
