<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - VigilAI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style type="text/tailwindcss">
        .paper-grid {
            background-size: 20px 20px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="bg-paper-bg text-black font-sans min-h-screen paper-grid flex items-center justify-center selection:bg-black selection:text-white">

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Top bar with logo and back link -->
    <div class="fixed top-0 left-0 right-0 bg-white border-b border-black z-10 px-8 py-4 flex items-center justify-between">
        <a href="/index.html" class="flex items-center space-x-3 hover:opacity-70 transition-opacity">
            <div class="w-8 h-8 bg-black flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-lg">visibility</span>
            </div>
            <span class="font-display font-bold text-xl">VigilAI</span>
        </a>
        <a href="/signup.html" class="text-sm font-mono text-slate-500 hover:text-black transition-colors">
            No account? <span class="font-bold text-black underline">Sign up →</span>
        </a>
    </div>

    <!-- Login Form -->
    <div class="w-full max-w-md mx-4 mt-16">
        <div class="bg-white border-2 border-black p-8 shadow-brutal">
            <div class="mb-8 text-center">
                <div class="w-16 h-16 bg-black border border-black flex items-center justify-center shadow-brutal-sm mx-auto mb-4">
                    <span class="material-symbols-outlined text-white text-4xl">visibility</span>
                </div>
                <h1 class="text-2xl font-display font-bold text-black mb-2">Welcome Back</h1>
                <p class="text-slate-500 font-mono text-sm">Sign in to your VigilAI account</p>
            </div>

            <form id="login-form" class="space-y-5">
                <!-- Error message area -->
                <div id="login-error" class="hidden bg-red-50 border-2 border-red-500 p-3 text-sm font-mono text-red-700"></div>

                <div>
                    <label for="email" class="block text-sm font-mono font-bold text-black mb-2 uppercase tracking-wider">
                        Email Address
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                        class="w-full px-4 py-3 border-2 border-black font-mono text-sm focus:outline-none focus:ring-0 focus:border-black shadow-brutal-sm"
                        placeholder="you@company.com"
                    />
                </div>

                <div>
                    <label for="password" class="block text-sm font-mono font-bold text-black mb-2 uppercase tracking-wider">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 border-2 border-black font-mono text-sm focus:outline-none focus:ring-0 focus:border-black shadow-brutal-sm"
                        placeholder="••••••••"
                    />
                </div>

                <button
                    type="submit"
                    id="login-btn"
                    class="w-full bg-black text-white py-4 font-mono font-bold uppercase tracking-widest text-sm border-2 border-black hover:bg-white hover:text-black transition-all shadow-brutal active:shadow-none active:translate-x-1 active:translate-y-1"
                >
                    Sign In →
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500 font-mono">
                    Don't have an account?
                    <a href="/signup.html" class="text-black font-bold hover:underline">Sign up</a>
                </p>
            </div>
        </div>

        <div class="mt-4 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-black shadow-brutal-sm">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <span class="text-xs font-mono font-bold uppercase">System: Operational</span>
            </div>
        </div>
    </div>

    <script type="module">
        const API_BASE = 'http://localhost:3000/api';
        const form = document.getElementById('login-form');
        const btn = document.getElementById('login-btn');
        const errBox = document.getElementById('login-error');

        // If already logged in, go to dashboard
        if (localStorage.getItem('auth_token')) {
            window.location.href = '/dashboard.html';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.classList.add('hidden');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errBox.textContent = 'Please enter your email and password.';
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store token and user
                localStorage.setItem('auth_token', data.data.token);
                localStorage.setItem('auth_user', JSON.stringify(data.data.user));

                // Redirect to dashboard
                window.location.href = '/dashboard.html';
            } catch (err) {
                errBox.textContent = err.message || 'Invalid email or password.';
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        });
    </script>
</body>
</html>
